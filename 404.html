<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>KR NETWORK</title>
    <script>
      (function () {
        var path = window.location.pathname || '';
        var search = window.location.search || '';
        var hash = window.location.hash || '';
        if (!path || path === '/' || path === '/index.html' || path === '/404.html') {
          window.location.replace('/index.html');
          return;
        }
        try {
          sessionStorage.setItem('__krGhPagesPath', path + search + hash);
        } catch (e) { /* ignore */ }
        window.location.replace('/index.html');
      })();
    </script>
  </head>
  <body></body>
</html>
