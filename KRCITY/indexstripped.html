    <!-- Mobile detection for globe fallback (GIF instead of 3D) -->
    <script>
      window.__isMobile = /Mobi|Android|iPhone|iPad|iPod|Touch/i.test(navigator.userAgent) || window.innerWidth <= 768;
      window.__krLoadDebugEvents = window.__krLoadDebugEvents || [];
      window.__krLoadDebug = function(stage, details) {
        try {
          const entry = {
            t: Math.round(performance.now()),
            stage,
            details: details || null
          };
          window.__krLoadDebugEvents.push(entry);
        } catch (err) {
          // Ignore debug event collection failures.
        }
      };
      window.__krLoadDebug('page_boot', {
        href: window.location.href,
        isMobile: window.__isMobile,
        innerWidth: window.innerWidth,
        userAgent: navigator.userAgent
      });
      window.addEventListener('error', function(event) {
        window.__krLoadDebug('window_error', {
          message: event.message,
          source: event.filename,
          line: event.lineno,
          column: event.colno
        });
      });
      window.addEventListener('unhandledrejection', function(event) {
        const reason = event && event.reason;
        window.__krLoadDebug('window_unhandledrejection', {
          reason: reason && reason.message ? reason.message : String(reason)
        });
      });
      document.addEventListener('DOMContentLoaded', function() {
        window.__krLoadDebug('index_dom_content_loaded');
      });
      window.addEventListener('load', function() {
        window.__krLoadDebug('index_window_load');
      });
      window.hideNetworkLoadingScreen = window.hideNetworkLoadingScreen || function() {
        const screen = document.getElementById('network-loading-screen');
        if (!screen) return;
        if (screen.dataset.hiding === '1') return;
        if (screen.style.display === 'none' || window.getComputedStyle(screen).display === 'none') return;
        screen.dataset.hiding = '1';
        window.__krLoadDebug('fallback_hide_loading_screen_start');
        screen.style.transition = 'opacity 0.3s ease-out';
        screen.style.opacity = '0';
        setTimeout(function() {
          screen.style.display = 'none';
          delete screen.dataset.hiding;
          window.__krLoadDebug('fallback_hide_loading_screen_done');
        }, 300);
      };
    </script>

    <!-- Immediate profile focus mode detection -->
    <script>
      // Check for link parameter immediately and add class before page renders
      const initialUrlParams = new URLSearchParams(window.location.search);
      if (initialUrlParams.get('link')) {
        document.documentElement.classList.add('profile-focus-mode');
      }

      // Apply initial hidden opacity to UI elements for staggered reveal
      document.addEventListener('DOMContentLoaded', () => {
        const selectors = [
          '.kr-navbar',
          '#network-searchbar-container',
          '#fixed-top-logo',
          '.kr-mobile-navbar-container',
          '#hamburger-btn',
          '#logged-in-user-status'
        ];
        selectors.forEach(sel => {
          document.querySelectorAll(sel).forEach(el => el.classList.add('fade-in-hidden'));
        });
      });
    </script>

    <style>
      /* Notification Bell */
      #notification-bell-btn {
        position: relative;
        background: black;
        border: 1px solid #ffffff;
        cursor: pointer;
        padding: 5px;
      }

      #notification-bell-btn.has-notifications .notification-indicator {
        position: absolute;
        top: -4px;
        right: -4px;
        width: 14px;
        height: 14px;
        background: radial-gradient(circle at 35% 35%, #ff8a80 0%, #ff3b30 42%, #c40018 100%);
        border-radius: 50%;
        border: 1.5px solid #120507;
        box-shadow:
          0 0 0 2px rgba(18, 5, 7, 0.7),
          0 0 10px rgba(255, 59, 48, 0.65);
        z-index: 2;
      }

      #notification-bell-btn.has-notifications .notification-indicator::after {
        content: "";
        position: absolute;
        inset: -5px;
        border-radius: 50%;
        border: 2px solid rgba(255, 59, 48, 0.9);
        box-shadow: 0 0 12px rgba(255, 59, 48, 0.35);
        animation: notification-pulse-ring 1.6s ease-out infinite;
      }

      @keyframes notification-pulse-ring {
        0% {
          transform: scale(0.85);
          opacity: 0.95;
        }
        65% {
          transform: scale(1.9);
          opacity: 0;
        }
        100% {
          transform: scale(1.9);
          opacity: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #notification-bell-btn.has-notifications .notification-indicator::after {
          animation: none;
          opacity: 0.65;
          transform: scale(1.18);
        }
      }

      }

      .join-kr-popup-content {
        position: relative;
        background: #0000ff;
        color: white;
        width: 100vw;

        padding: 100px 20px 100px 20px;
